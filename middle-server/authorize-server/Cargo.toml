[package]
name = "authorize-server"
version = "0.1.0"
edition = "2024"

[dependencies]
axum.workspace = true
axum-starter.workspace = true
hmac.workspace = true
rand = "0.9.0"
sha2.workspace = true
tracing.workspace = true
tracing-unwrap.workspace = true
urlencoding.workspace = true
serde = { version = "1.0.201", features = ["derive"] }
jsonwebtoken = "9.3.1"
chrono.workspace = true
persistence = { workspace = true, features = ["help-crates", "model-admin","model-ceobe-user"] }
status-err.workspace = true
thiserror.workspace = true
tower.workspace = true
tower-http = { version = "0.6.2", features = ["auth"] }
tap.workspace = true
axum-resp-result.workspace = true
crypto_str = { version = "0.1.0", path = "../../libs/crypto_str" }
http.workspace = true
